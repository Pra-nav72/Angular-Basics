
<hr><hr>
<div class="main">
    <h2>Counter App</h2>
    <p>{{count()}}</p>
    <div class="div-btn">
        <button (click)="updateCount('-')">-</button>
        <button style="background-color: bisque; color: black;" (click)="updateCount('r')">reset</button>
        <button (click)="updateCount('+')">+</button>
    </div>
</div>
